<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>London 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <style>
    :root {
      --red: #C8102E;
      --red2: rgba(200,16,46,0.12);
      --navy: #0F172A;
      --bg: #F5F4F0;
      --card: #FFFFFF;
      --text: #0F172A;
      --muted: #64748B;
      --border: #E2E8F0;
      --urgent: #DC2626;
      --soon: #D97706;
      --ok: #16A34A;
      --tab-h: 72px;
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* HEADER */
    #header {
      background: var(--red); color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; padding-top: max(env(safe-area-inset-top, 0px), 12px);
      flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }
    #header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header-dates {
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.18); padding: 4px 10px;
      border-radius: 20px; letter-spacing: 0.2px;
    }

    /* TABS */
    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-content.active { display: flex; }
    .scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* BOTTOM NAV */
    #bottom-nav {
      display: flex; background: white;
      border-top: 1px solid var(--border);
      height: var(--tab-h); flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      border: none; background: none; font-size: 10px; font-weight: 700;
      color: #94A3B8; cursor: pointer; transition: color 0.2s; letter-spacing: 0.2px;
    }
    .nav-tab.active { color: var(--red); }
    .nav-icon-wrap {
      width: 44px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 14px; transition: background 0.2s;
    }
    .nav-tab.active .nav-icon-wrap { background: var(--red2); }
    .nav-icon-wrap i { font-size: 22px; }

    /* DAY STRIP */
    .day-strip {
      display: flex; gap: 6px; padding: 10px 14px;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      background: white; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-chip {
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 14px; border-radius: 24px; border: 1.5px solid var(--border);
      background: transparent; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.2s; font-family: inherit;
    }
    .day-chip.active { background: var(--red); border-color: var(--red); color: white; box-shadow: 0 2px 8px rgba(200,16,46,0.3); }
    .chip-label { font-size: 11px; font-weight: 800; line-height: 1; }
    .chip-sub { font-size: 9px; opacity: 0.6; margin-top: 2px; font-weight: 600; letter-spacing: 0.1px; }

    /* TIMELINE */
    .timeline { padding: 12px 14px 32px; display: flex; flex-direction: column; gap: 8px; }
    .day-heading {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); padding: 10px 2px 4px;
    }
    .stop-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border-radius: var(--radius); padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(15,23,42,.06), 0 2px 8px rgba(15,23,42,.04);
      cursor: pointer; border-left: 3px solid transparent; transition: transform 0.12s, box-shadow 0.12s;
    }
    .stop-card:active { transform: scale(0.975); box-shadow: 0 1px 2px rgba(0,0,0,.05); }
    .stop-card.transport { border-color: #94A3B8; }
    .stop-card.museum    { border-color: #3B82F6; }
    .stop-card.church    { border-color: #8B5CF6; }
    .stop-card.market    { border-color: #F97316; }
    .stop-card.food      { border-color: #EF4444; }
    .stop-card.park      { border-color: #22C55E; }
    .stop-card.viewpoint { border-color: #EAB308; }
    .stop-card.attraction{ border-color: var(--red); }
    .stop-time { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 42px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* STOP TYPE ICON */
    .stop-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stop-icon i { font-size: 19px; }
    .stop-card.transport .stop-icon { background: rgba(148,163,184,.15); }
    .stop-card.transport .stop-icon i { --ph-color:#94A3B8; --ph-color-secondary:rgba(148,163,184,.3); }
    .stop-card.museum    .stop-icon { background: rgba(59,130,246,.12); }
    .stop-card.museum    .stop-icon i { --ph-color:#3B82F6; --ph-color-secondary:rgba(59,130,246,.25); }
    .stop-card.church    .stop-icon { background: rgba(139,92,246,.12); }
    .stop-card.church    .stop-icon i { --ph-color:#8B5CF6; --ph-color-secondary:rgba(139,92,246,.25); }
    .stop-card.market    .stop-icon { background: rgba(249,115,22,.12); }
    .stop-card.market    .stop-icon i { --ph-color:#F97316; --ph-color-secondary:rgba(249,115,22,.25); }
    .stop-card.food      .stop-icon { background: rgba(239,68,68,.12); }
    .stop-card.food      .stop-icon i { --ph-color:#EF4444; --ph-color-secondary:rgba(239,68,68,.25); }
    .stop-card.park      .stop-icon { background: rgba(34,197,94,.12); }
    .stop-card.park      .stop-icon i { --ph-color:#22C55E; --ph-color-secondary:rgba(34,197,94,.25); }
    .stop-card.viewpoint .stop-icon { background: rgba(234,179,8,.12); }
    .stop-card.viewpoint .stop-icon i { --ph-color:#EAB308; --ph-color-secondary:rgba(234,179,8,.25); }
    .stop-card.attraction .stop-icon { background: rgba(200,16,46,.12); }
    .stop-card.attraction .stop-icon i { --ph-color:#C8102E; --ph-color-secondary:rgba(200,16,46,.25); }

    .stop-body { flex: 1; min-width: 0; }
    .stop-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 700; padding: 2px 7px 2px 5px;
      border-radius: 20px; line-height: 1.4;
    }
    .tag i { font-size: 11px; }
    .tag-booking { background: #FEF3C7; color: #92400E; }
    .tag-ticket  { background: #FEE2E2; color: #991B1B; }
    .tag-free    { background: #DCFCE7; color: #166534; }
    .tag-tip     { background: #EDE9FE; color: #5B21B6; }
    .stop-arrow  { color: #CBD5E1; flex-shrink: 0; font-size: 18px; }

    /* MAP */
    #map-container { flex: 1; position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; }
    .legend {
      display: flex; gap: 10px; padding: 8px 14px;
      overflow-x: auto; scrollbar-width: none; background: white;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .legend::-webkit-scrollbar { display: none; }
    .legend-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-size: 10px; font-weight: 600; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* OVERLAY + SHEET */
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 900; display: none; transition: background 0.3s; }
    #overlay.show { display: block; background: rgba(15,23,42,0.5); }
    #sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 48px rgba(15,23,42,.18); z-index: 950;
      transform: translateY(100%); transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh; display: flex; flex-direction: column;
    }
    #sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: #E2E8F0; border-radius: 2px; margin: 14px auto 0; flex-shrink: 0; }
    #sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 18px 8px; flex: 1; min-height: 0; }
    #sheet-footer {
      padding: 12px 18px;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px);
      background: white;
      border-top: 1px solid #F1F5F9;
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* PHOTO STATES */
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.4} }
    .sheet-placeholder {
      width: 100%; aspect-ratio: 1 / 1; border-radius: 18px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #EEF2FF 0%, #C7D2FE 100%);
    }
    .sheet-placeholder i { font-size: 56px; color: #6366F1; --ph-color: #6366F1; --ph-color-secondary: rgba(99,102,241,0.25); }
    .sheet-placeholder.loading { animation: shimmer 1.4s ease-in-out infinite; }

    /* typed placeholder backgrounds */
    .sheet-placeholder.type-transport { background: linear-gradient(135deg,#F1F5F9 0%,#CBD5E1 100%); }
    .sheet-placeholder.type-transport i { --ph-color:#94A3B8; --ph-color-secondary:rgba(148,163,184,.3); color:#94A3B8; }
    .sheet-placeholder.type-museum { background: linear-gradient(135deg,#EFF6FF 0%,#BFDBFE 100%); }
    .sheet-placeholder.type-museum i { --ph-color:#3B82F6; --ph-color-secondary:rgba(59,130,246,.28); color:#3B82F6; }
    .sheet-placeholder.type-church { background: linear-gradient(135deg,#F5F3FF 0%,#DDD6FE 100%); }
    .sheet-placeholder.type-church i { --ph-color:#8B5CF6; --ph-color-secondary:rgba(139,92,246,.28); color:#8B5CF6; }
    .sheet-placeholder.type-market { background: linear-gradient(135deg,#FFF7ED 0%,#FED7AA 100%); }
    .sheet-placeholder.type-market i { --ph-color:#F97316; --ph-color-secondary:rgba(249,115,22,.28); color:#F97316; }
    .sheet-placeholder.type-food { background: linear-gradient(135deg,#FEF2F2 0%,#FECACA 100%); }
    .sheet-placeholder.type-food i { --ph-color:#EF4444; --ph-color-secondary:rgba(239,68,68,.28); color:#EF4444; }
    .sheet-placeholder.type-park { background: linear-gradient(135deg,#F0FDF4 0%,#BBF7D0 100%); }
    .sheet-placeholder.type-park i { --ph-color:#22C55E; --ph-color-secondary:rgba(34,197,94,.28); color:#22C55E; }
    .sheet-placeholder.type-viewpoint { background: linear-gradient(135deg,#FEFCE8 0%,#FEF08A 100%); }
    .sheet-placeholder.type-viewpoint i { --ph-color:#EAB308; --ph-color-secondary:rgba(234,179,8,.28); color:#EAB308; }
    .sheet-placeholder.type-attraction { background: linear-gradient(135deg,#FFF1F2 0%,#FECDD3 100%); }
    .sheet-placeholder.type-attraction i { --ph-color:#C8102E; --ph-color-secondary:rgba(200,16,46,.28); color:#C8102E; }

    .sheet-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 18px; margin-bottom: 16px; display: block; background: #F1F5F9; }

    /* SHEET CONTENT */
    .sheet-name { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.3px; }
    .sheet-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); font-weight: 500; margin-bottom: 14px;
    }
    .sheet-meta i { font-size: 15px; --ph-color: var(--muted); --ph-color-secondary: rgba(100,116,139,0.2); }
    .sheet-tip {
      display: flex; gap: 8px;
      font-size: 12px; line-height: 1.55; background: #FFFBEB; color: #78350F;
      border-radius: 12px; padding: 11px 13px; margin-bottom: 12px;
      border: 1px solid #FDE68A;
    }
    .sheet-tip i { font-size: 16px; flex-shrink: 0; margin-top: 1px; --ph-color: #D97706; --ph-color-secondary: rgba(217,119,6,0.2); }
    .sheet-desc-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 7px; margin-top: 2px;
    }
    .sheet-desc-label i { font-size: 13px; --ph-color: var(--muted); }
    .sheet-desc { font-size: 13px; line-height: 1.7; color: #475569; margin-bottom: 6px; }
    .btn-go {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px; background: var(--red);
      color: white; text-decoration: none; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit;
      box-shadow: 0 3px 12px rgba(200,16,46,0.35);
    }
    .btn-go i { font-size: 20px; --ph-color: white; --ph-color-secondary: rgba(255,255,255,0.3); }
    .btn-go:active { opacity: 0.88; transform: scale(0.99); }
    .btn-tfl {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px; background: var(--navy);
      color: white; text-decoration: none; border: none; border-radius: 14px;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-tfl i { font-size: 18px; --ph-color: white; --ph-color-secondary: rgba(255,255,255,0.25); }
    .btn-tfl:active { opacity: 0.88; }

    /* REZERVARI */
    .rez-section { padding: 12px 14px 32px; display: flex; flex-direction: column; gap: 14px; }
    .rez-heading { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); padding: 10px 2px 4px; }
    .rez-card {
      background: var(--card); border-radius: 18px; padding: 18px;
      box-shadow: 0 1px 4px rgba(15,23,42,.06), 0 2px 10px rgba(15,23,42,.04);
      border-left: 4px solid;
    }
    .rez-card.urgent { border-color: var(--urgent); }
    .rez-card.soon   { border-color: var(--soon); }
    .rez-card.ok     { border-color: var(--ok); }
    .rez-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px 4px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 800; margin-bottom: 10px; letter-spacing: 0.1px;
    }
    .rez-badge i { font-size: 14px; }
    .urgent .rez-badge { background: #FEF2F2; color: var(--urgent); }
    .urgent .rez-badge i { --ph-color: var(--urgent); --ph-color-secondary: rgba(220,38,38,0.15); }
    .soon   .rez-badge { background: #FFFBEB; color: var(--soon); }
    .soon   .rez-badge i { --ph-color: var(--soon); --ph-color-secondary: rgba(217,119,6,0.15); }
    .ok     .rez-badge { background: #F0FDF4; color: var(--ok); }
    .ok     .rez-badge i { --ph-color: var(--ok); --ph-color-secondary: rgba(22,163,74,0.15); }
    .rez-name { font-size: 18px; font-weight: 800; margin-bottom: 3px; letter-spacing: -0.3px; }
    .rez-when { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .rez-when i { font-size: 14px; --ph-color: var(--muted); }
    .rez-note { font-size: 13px; line-height: 1.55; margin-bottom: 5px; }
    .rez-deadline { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .rez-deadline i { font-size: 14px; --ph-color: var(--muted); }
    .btn-book {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; text-align: center; text-decoration: none;
      color: white; font-family: inherit; cursor: pointer;
    }
    .btn-book i { font-size: 18px; --ph-color: white; --ph-color-secondary: rgba(255,255,255,0.25); }
    .btn-book:active { opacity: 0.88; }
    .urgent .btn-book { background: var(--urgent); box-shadow: 0 2px 8px rgba(220,38,38,0.3); }
    .soon   .btn-book { background: var(--soon); box-shadow: 0 2px 8px rgba(217,119,6,0.3); }
    .ok     .btn-book { background: var(--ok); }
    .btn-done-toggle {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 11px; background: #F8FAFC;
      color: var(--muted); border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 13px; font-weight: 700; text-align: center;
      cursor: pointer; font-family: inherit; margin-top: 8px;
    }
    .btn-done-toggle i { font-size: 16px; --ph-color: var(--muted); }
    .btn-done-toggle.done { background: #F0FDF4; color: var(--ok); border-color: #BBF7D0; }
    .btn-done-toggle.done i { --ph-color: var(--ok); --ph-color-secondary: rgba(22,163,74,0.2); }
    .rez-card.done { opacity: 0.6; }

    /* TODAY CHIP */
    .chip-today:not(.active) { border-color: var(--red); }
    .chip-today:not(.active) .chip-label { color: var(--red); }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1><img src="https://flagcdn.com/gb.svg" width="26" height="18" alt="UK" style="vertical-align:middle;border-radius:3px;margin-right:8px;box-shadow:0 1px 4px rgba(0,0,0,0.3)"> London 2026</h1>
    <span class="header-dates">17 &ndash; 22 Iunie</span>
  </div>
  <div id="tab-program" class="tab-content active">
    <div class="day-strip" id="prog-strip"></div>
    <div class="scrollable"><div class="timeline" id="timeline"></div></div>
  </div>
  <div id="tab-harta" class="tab-content">
    <div class="day-strip" id="map-strip"></div>
    <div class="legend" id="legend"></div>
    <div id="map-container"><div id="map"></div></div>
  </div>
  <div id="tab-rezervari" class="tab-content">
    <div class="scrollable"><div class="rez-section" id="rez-list"></div></div>
  </div>
  <nav id="bottom-nav">
    <button class="nav-tab active" data-tab="program">
      <span class="nav-icon-wrap"><i class="ph-duotone ph-calendar-dots"></i></span>
      <span>Program</span>
    </button>
    <button class="nav-tab" data-tab="harta">
      <span class="nav-icon-wrap"><i class="ph-duotone ph-map-trifold"></i></span>
      <span>Hart&#x103;</span>
    </button>
    <button class="nav-tab" data-tab="rezervari">
      <span class="nav-icon-wrap"><i class="ph-duotone ph-ticket"></i></span>
      <span>Rezerv&#x103;ri</span>
    </button>
  </nav>
</div>
<div id="overlay"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-body"></div>
  <div id="sheet-footer"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const DAYS = [
  {
    id:1, label:"Ziua 1", short:"Mie", date:"17 Iun", iso:"2026-06-17",
    stops:[
      {time:"07:30", name:"Stansted Airport — Sosiri", lat:51.8857, lng:0.2352, type:"transport", wiki:"London Stansted Airport"},
      {time:"~08:15", name:"Stansted Express spre Liverpool Street", lat:51.5178, lng:-0.0823, type:"transport", wiki:"Stansted Express",
        tip:"Metroul londonez: plătești cu cardul bancar contactless direct — același preț ca Oyster, fără card separat. Tap in și tap out la bariere. Funcționează pe tot metroul, DLR, Overground și autobuze."},
      {time:"~09:05", name:"Liverpool Street — depozitare bagaje", lat:51.5178, lng:-0.0823, type:"transport", wiki:"London Liverpool Street station",
        tip:"Left luggage disponibil în gară, ~£12/bag/zi. Verifică deschiderea la sosire."},
      {time:"09:30", name:"Old Spitalfields Market", lat:51.5192, lng:-0.0726, type:"market", wiki:"Old Spitalfields Market",
        tip:"Piața deschide la 10:00. Promenează zona exterioară și artizanii locali înainte de deschidere.",
        desc:"Piața Spitalfields funcționează pe același loc din 1638, când Regele Carol I a acordat permisul de comercializare. Zona a primit valuri succesive de imigranți — hughenoți, evrei, bangladezieni — fiecare lăsând urme vizibile în arhitectură, gastronomie și artă."},
      {time:"10:00", name:"Shoreditch Street Art Walk — Redchurch St & Brick Lane", lat:51.5228, lng:-0.0717, type:"attraction", wiki:"Brick Lane",
        tip:"Cele mai bune murale sunt pe Hanbury St, Redchurch St și Sclater St. Fă-ți propriul tur — nu ai nevoie de ghid.",
        desc:"Brick Lane este inima comunității bangladeze din Londra și epicentrul artei stradale europene. Zidul de pe Hanbury Street este re-pictat complet la fiecare câteva săptămâni de artiști internaționali — nu există o operă permanentă, totul e efemer. Strada a apărut în sec. XVII ca loc de fabricat cărămizi pentru construcția Londrei post-incendiu."},
      {time:"11:30", name:"Beigel Bake — 159 Brick Lane (prânz iconic)", lat:51.5226, lng:-0.0718, type:"food", wiki:"Beigel Bake",

        desc:"Deschis în 1855 de imigranți evrei din Europa de Est, Beigel Bake este cel mai vechi magazin de covrigi din Londra. Funcționează 24/7, 365 de zile pe an, de 170 de ani. Prețurile n-au urmat inflația — un covrig cu somon afumat costă în continuare sub £5."},

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function append(p, ...kids) { kids.forEach(k => k && p.appendChild(k)); return p; }
function ph(name, cls) {
  const i = document.createElement('i');
  i.className = 'ph-duotone ph-' + name + (cls ? ' ' + cls : '');
  return i;
}

function stripEmoji(str) {
  return str
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{2BFF}]/gu, '')
    .replace(/\u{FE0F}/gu, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// ── PHOTO CACHE & WIKIPEDIA API ───────────────────────────────────────────────
const photoCache = {};

async function getPhoto(wiki) {
  if (!wiki) return null;
  if (wiki in photoCache) return photoCache[wiki];
  try {
    const r = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(wiki));
    if (!r.ok) { photoCache[wiki] = null; return null; }
    const d = await r.json();
    const thumb = (d.thumbnail || {}).source;
    const orig  = (d.originalimage || {}).source;
    const base  = thumb || orig;
    if (!base) { photoCache[wiki] = null; return null; }
    const src = base.includes("/thumb/")
      ? base.replace(/\/\d+px-[^/]+$/, "/800px-" + base.split("/").pop().replace(/^\d+px-/, ""))
      : base;
    const url = "https://wsrv.nl/?url=" + encodeURIComponent(src) + "&w=800&h=800&fit=cover&output=jpg";
    photoCache[wiki] = url;
    return url;
  } catch { photoCache[wiki] = null; return null; }
}

function prefetchDay(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return;
  day.stops.forEach(s => { if (s.wiki && !(s.wiki in photoCache)) getPhoto(s.wiki); });
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeTab = "program";
let activeDay = 1;
let leafMap = null;
let mapMarkers = [];
let sheetToken = 0;

function todayDayId() {
  const today = new Date().toISOString().slice(0,10);
  const found = DAYS.find(d => d.iso === today);
  return found ? found.id : 1;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll(".nav-tab").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab));
});

function switchTab(tab) {
  document.querySelectorAll(".tab-content").forEach(e => e.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(e => e.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.querySelector(".nav-tab[data-tab='" + tab + "']").classList.add("active");
  activeTab = tab;
  if (tab === "harta") {
    if (!leafMap) initMap();
    else renderMapPins(activeDay);
    setTimeout(() => leafMap && leafMap.invalidateSize(), 120);
  }
}

// ── DAY STRIP ─────────────────────────────────────────────────────────────────
function buildStrip(containerId, activeId, onSelect) {
  const container = document.getElementById(containerId);
  const todayId = todayDayId();
  while (container.firstChild) container.removeChild(container.firstChild);
  DAYS.forEach(d => {
    const isToday = d.id === todayId;
    let cls = "day-chip";
    if (d.id === activeId) cls += " active";
    if (isToday) cls += " chip-today";
    const btn = el("button", cls);
    const lbl = el("span", "chip-label"); lbl.textContent = d.label;
    const sub = el("span", "chip-sub");
    sub.textContent = d.short + " \xB7 " + d.date + (isToday ? " \xB7 AZI" : "");
    append(btn, lbl, sub);
    btn.addEventListener("click", () => onSelect(d.id));
    container.appendChild(btn);
    if (d.id === activeId) setTimeout(() => btn.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"}), 50);
  });
}

// ── DAY SELECTION — syncs both tabs ───────────────────────────────────────────
function selectDay(dayId) {
  activeDay = dayId;
  buildStrip("prog-strip", dayId, selectDay);
  buildStrip("map-strip", dayId, selectDay);
  if (activeTab === "program") renderTimeline(dayId);
  if (activeTab === "harta" && leafMap) renderMapPins(dayId);
  prefetchDay(dayId);
}

// ── PROGRAM TAB ───────────────────────────────────────────────────────────────
function renderTimeline(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  const box = document.getElementById("timeline");
  while (box.firstChild) box.removeChild(box.firstChild);

  const heading = el("div", "day-heading");
  heading.textContent = day.short + ", " + day.date + (dayId === 5 ? " — Solstițiu" : "");
  box.appendChild(heading);

  day.stops.forEach(stop => {
    const card = el("div", "stop-card " + stop.type);
    const timeEl = el("div", "stop-time"); timeEl.textContent = stop.time;
    const iconWrap = el("div", "stop-icon");
    iconWrap.appendChild(ph(TYPE_ICON[stop.type] || "map-pin"));
    const body = el("div", "stop-body");
    const nameEl = el("div", "stop-name"); nameEl.textContent = stripEmoji(stop.name);
    body.appendChild(nameEl);

    const allTags = [...(stop.tags || [])];
    const hasTip = !!stop.tip;
    if (allTags.length || hasTip) {
      const tagsEl = el("div", "tags");
      allTags.forEach(t => {
        const cfg = {
          booking: {cls:"tag-booking", icon:"clipboard-text", label:"Rezervare"},
          ticket:  {cls:"tag-ticket",  icon:"ticket",         label:"Bilet"},
          free:    {cls:"tag-free",    icon:"check-circle",   label:"Gratuit"}
        }[t];
        if (!cfg) return;
        const tag = el("span", "tag " + cfg.cls);
        tag.appendChild(ph(cfg.icon));
        tag.appendChild(document.createTextNode(cfg.label));
        tagsEl.appendChild(tag);
      });
      if (hasTip) {
        const tipTag = el("span", "tag tag-tip");
        tipTag.appendChild(ph("lightbulb"));
        tipTag.appendChild(document.createTextNode("Sfat"));
        tagsEl.appendChild(tipTag);
      }
      body.appendChild(tagsEl);
    }

    const arrow = el("div", "stop-arrow"); arrow.appendChild(ph("caret-right"));
    append(card, timeEl, iconWrap, body, arrow);
    card.addEventListener("click", () => openSheet(stop));
    box.appendChild(card);
  });
}

// ── MAP TAB ───────────────────────────────────────────────────────────────────
function buildLegend() {
  const box = document.getElementById("legend");
  while (box.firstChild) box.removeChild(box.firstChild);
  LEGEND_ITEMS.forEach(item => {
    const wrap = el("div", "legend-item");
    const dot = el("div", "legend-dot"); dot.style.background = item.color;
    const lbl = el("span"); lbl.textContent = item.label;
    append(wrap, dot, lbl);
    box.appendChild(wrap);
  });
}

function initMap() {
  leafMap = L.map("map", {zoomControl:false}).setView([51.515, -0.09], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {attribution:"© OpenStreetMap", maxZoom:19}).addTo(leafMap);
  L.control.zoom({position:"bottomright"}).addTo(leafMap);
  renderMapPins(activeDay);
}

function renderMapPins(dayId) {
  if (!leafMap) return;
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];
  const stops = DAYS.find(d => d.id === dayId).stops.filter(s => s.type !== "transport");
  const bounds = [];
  stops.forEach((stop, i) => {
    const c = PIN_COLORS[stop.type] || "#C8102E";
    const html = "<div style=\"background:" + c + ";color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35)\">" + (i+1) + "</div>";
    const icon = L.divIcon({html, className:"", iconSize:[30,30], iconAnchor:[15,15]});
    const marker = L.marker([stop.lat, stop.lng], {icon}).addTo(leafMap).on("click", () => openSheet(stop));
    mapMarkers.push(marker);
    bounds.push([stop.lat, stop.lng]);
  });
  if (bounds.length) leafMap.fitBounds(bounds, {padding:[52,52]});
}

// ── BOTTOM SHEET ──────────────────────────────────────────────────────────────
const overlay = document.getElementById("overlay");
const sheet = document.getElementById("sheet");
const sheetBody = document.getElementById("sheet-body");
const sheetFooter = document.getElementById("sheet-footer");
overlay.addEventListener("click", closeSheet);

async function openSheet(stop) {
  const token = ++sheetToken;
  while (sheetBody.firstChild) sheetBody.removeChild(sheetBody.firstChild);
  while (sheetFooter.firstChild) sheetFooter.removeChild(sheetFooter.firstChild);

  const loader = el("div", "sheet-placeholder loading type-" + stop.type);
  loader.appendChild(ph(TYPE_ICON[stop.type] || "map-pin"));
  sheetBody.appendChild(loader);

  const nameEl = el("div", "sheet-name"); nameEl.textContent = stripEmoji(stop.name);
  sheetBody.appendChild(nameEl);

  const metaEl = el("div", "sheet-meta");
  metaEl.appendChild(ph("clock"));
  metaEl.appendChild(document.createTextNode(stop.time));
  sheetBody.appendChild(metaEl);

  if (stop.tip) {
    const tipEl = el("div", "sheet-tip");
    tipEl.appendChild(ph("lightbulb"));
    const tipTxt = el("span"); tipTxt.textContent = stop.tip;
    tipEl.appendChild(tipTxt);
    sheetBody.appendChild(tipEl);
  }
  if (stop.desc) {
    const lbl = el("div", "sheet-desc-label");
    lbl.appendChild(ph("book-open"));
    lbl.appendChild(document.createTextNode("Despre acest loc"));
    sheetBody.appendChild(lbl);
    const descEl = el("div", "sheet-desc"); descEl.textContent = stop.desc;
    sheetBody.appendChild(descEl);
  }

  const isTransport = stop.type === "transport";
  const mapsUrl = "https://www.google.com/maps/dir/?api=1&destination=" + stop.lat + "," + stop.lng
    + (isTransport ? "&travelmode=transit" : "");
  const link = document.createElement("a");
  link.className = "btn-go";
  link.href = mapsUrl;
  link.target = "_blank";
  link.rel = "noopener noreferrer";
  link.appendChild(ph(isTransport ? "train-simple" : "navigation-arrow"));
  link.appendChild(document.createTextNode(isTransport ? "Deschide ruta cu metroul" : "Dute acolo"));
  sheetFooter.appendChild(link);
  if (isTransport) {
    const tfl = document.createElement("a");
    tfl.className = "btn-tfl";
    tfl.href = "https://tfl.gov.uk/tube-dlr-overground/status/";
    tfl.target = "_blank";
    tfl.rel = "noopener noreferrer";
    tfl.appendChild(ph("warning-circle"));
    tfl.appendChild(document.createTextNode("Status metrou TfL →"));
    sheetFooter.appendChild(tfl);
  }

  overlay.classList.add("show");
  requestAnimationFrame(() => sheet.classList.add("open"));

  if (stop.wiki) {
    const url = await getPhoto(stop.wiki);
    if (token !== sheetToken) return;
    if (url && loader.parentNode) {
      const img = document.createElement("img");
      img.className = "sheet-img";
      img.src = url;
      img.alt = "";
      img.loading = "lazy";
      img.addEventListener("error", () => {
        if (img.parentNode) img.parentNode.replaceChild(loader, img);
        loader.classList.remove("loading");
      });
      loader.parentNode.replaceChild(img, loader);
    } else if (loader.parentNode) {
      loader.classList.remove("loading");
    }
  } else if (loader.parentNode) {
    loader.classList.remove("loading");
  }
}

function closeSheet() {
  sheet.classList.remove("open");
  overlay.classList.remove("show");
}

  const badgeCfg = {
    urgent: {icon:"warning-circle",  doneIcon:"check-circle"},
    soon:   {icon:"clock-countdown", doneIcon:"check-circle"},
    ok:     {icon:"check-circle",    doneIcon:"check-circle"}
  };
  BOOKINGS.forEach(b => {
    const isDone = !!done[b.id];
    const cfg = badgeCfg[b.urgency] || badgeCfg.ok;
    const card = el("div", "rez-card " + b.urgency + (isDone ? " done" : ""));

    const badge = el("div", "rez-badge");
    badge.appendChild(ph(isDone ? cfg.doneIcon : cfg.icon));
    badge.appendChild(document.createTextNode(isDone ? "Rezervat" : b.badge));

    const name = el("div", "rez-name"); name.textContent = b.name;

    const when = el("div", "rez-when");
    when.appendChild(ph("calendar-blank"));
    when.appendChild(document.createTextNode(b.when));

    const note = el("div", "rez-note"); note.textContent = b.note;

    const deadline = el("div", "rez-deadline");
    deadline.appendChild(ph("timer"));
    deadline.appendChild(document.createTextNode(b.deadline));

    const link = document.createElement("a");
    link.className = "btn-book"; link.href = b.url; link.target = "_blank"; link.rel = "noopener noreferrer";
    link.appendChild(ph("arrow-square-out"));
    link.appendChild(document.createTextNode(b.btn));

    const toggle = el("button", "btn-done-toggle" + (isDone ? " done" : ""));
    toggle.appendChild(ph(isDone ? "check-square" : "square"));
    toggle.appendChild(document.createTextNode(isDone ? "Rezervat — apasă pentru a anula" : "Marchează ca rezervat"));
    toggle.addEventListener("click", () => { setRezDone(b.id, !isDone); renderRezervari(); });

    append(card, badge, name, when, note, deadline, link, toggle);
    box.appendChild(card);
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
const startDay = todayDayId();
activeDay = startDay;
buildLegend();
buildStrip("prog-strip", startDay, selectDay);
buildStrip("map-strip", startDay, selectDay);
renderTimeline(startDay);
prefetchDay(startDay);
renderRezervari();
</script>
</body>
</html>
