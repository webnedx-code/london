<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>London 2026</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">

  <!-- App styles (modular) -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/day-strip.css">
  <link rel="stylesheet" href="css/program.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/sheet.css">
  <link rel="stylesheet" href="css/rezervari.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header__title">
        <img class="header__flag" src="https://flagcdn.com/gb.svg" width="26" height="18" alt="UK">
        <span>London 2026</span>
      </h1>
      <div class="header__right">
        <span class="header__countdown" data-countdown>--</span>
        <span class="header__dates">17–22 IUNIE 2026</span>
      </div>
    </header>

    <!-- Tab: Program -->
    <section id="tab-program" class="tab-content is-active">
      <div class="day-strip" id="prog-strip"></div>
      <div class="scrollable">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <!-- Tab: Hartă -->
    <section id="tab-harta" class="tab-content">
      <div class="day-strip" id="map-strip"></div>
      <div class="legend" id="legend"></div>
      <div class="map-container">
        <div id="map" class="map-container__canvas"></div>
      </div>
    </section>

    <!-- Tab: Rezervări -->
    <section id="tab-rezervari" class="tab-content">
      <div class="scrollable">
        <div class="rez-section" id="rez-list"></div>
      </div>
    </section>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <button class="nav-tab is-active" data-tab="program">
        <span class="nav-tab__icon"><i class="ph-duotone ph-calendar-dots"></i></span>
        <span>Program</span>
      </button>
      <button class="nav-tab" data-tab="harta">
        <span class="nav-tab__icon"><i class="ph-duotone ph-map-trifold"></i></span>
        <span>Hart&#x103;</span>
      </button>
      <button class="nav-tab" data-tab="rezervari">
        <span class="nav-tab__icon"><i class="ph-duotone ph-ticket"></i></span>
        <span>Rezerv&#x103;ri</span>
      </button>
    </nav>
  </div>

  <!-- Bottom sheet -->
  <div id="overlay" class="overlay"></div>
  <aside id="sheet" class="sheet">
    <div class="sheet__handle"></div>
    <div id="sheet-body" class="sheet__body"></div>
    <div id="sheet-footer" class="sheet__footer"></div>
  </aside>

  <!-- Vendor JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App entry (ES Modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
